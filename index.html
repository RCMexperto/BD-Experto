<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        try {
          const target = Object.getOwnPropertyDescriptor(window, 'fetch') ? window : Window.prototype;
          const desc = Object.getOwnPropertyDescriptor(target, 'fetch');
          if (desc && !desc.set && desc.get) {
            Object.defineProperty(target, 'fetch', {
              get: desc.get,
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true
            });
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
